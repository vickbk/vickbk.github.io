<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Audio and Video Lab</title>
    <meta
      name="description"
      content="A simple audio and video player for beginners"
    />
  </head>
  <body>
    <main>
      <h1>A simple audio and video player from FreeCodeCamp</h1>
      <section>
        <h2>The title of the video playing</h2>
        <video controls autoplay width="640">
          <source
            src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
            type="video/mp4"
          />
        </video>
      </section>
      <section>
        <h2>The title of the audio playing</h2>
        <audio
          src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3"
          loop
          controls
        ></audio>
      </section>
    </main>
  </body>
</html>
